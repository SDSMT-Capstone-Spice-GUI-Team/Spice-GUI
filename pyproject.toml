[tool.pytest.ini_options]
pythonpath = ["app"]
testpaths = ["app/tests"]

[tool.coverage.run]
source = ["."]
omit = [
    "tests/*",
    "conftest.py",
]

[tool.coverage.report]
fail_under = 80
show_missing = true
exclude_lines = [
    "pragma: no cover",
    "if __name__ == .__main__.",
    "if TYPE_CHECKING:",
]
